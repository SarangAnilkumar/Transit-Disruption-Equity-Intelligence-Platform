project_name: transit-disruption-equity

paths:
  raw_data_dir: data/raw
  processed_data_dir: data/processed
  logs_dir: logs

gtfs_static:
  url: ${GTFS_STATIC_URL}
  output_filename: gtfs_static.zip
  key_files:
    - stops.txt
    - routes.txt
    - trips.txt
    - stop_times.txt
    - calendar.txt
    - calendar_dates.txt

gtfs_realtime:
  snapshot_frequency_minutes: 15
  timeout_seconds: 60
  user_agent: transit-disruption-equity/0.1
  feeds:
    trip_updates:
      url: ${GTFS_REALTIME_TRIP_UPDATES_URL}
      format: protobuf
    service_alerts:
      url: ${GTFS_REALTIME_SERVICE_ALERTS_URL}
      format: protobuf
  auth:
    api_key_env_var: TRANSPORT_API_KEY
    auth_mode: header
    header_name: Ocp-Apim-Subscription-Key
    query_param_name: subscription-key

geospatial:
  sa2_boundaries_path: data/raw/geospatial/sa2_boundaries/<your_sa2_boundary_file.gpkg>
  sa2_boundary_layer:
  output_dir: data/processed/geospatial
  target_crs: EPSG:4326
  projected_crs: EPSG:7855

equity:
  seifa_sa2_path: data/raw/equity/seifa/<your_seifa_sa2_file.xlsx>
  output_dir: data/processed/equity
  seifa_release_year: 2021

analytics:
  output_dir: data/processed/analytics

warehouse:
  output_dir: data/processed/warehouse_ready
  schema_path: config/warehouse_schemas.yml

aws:
  region: ap-southeast-2
  warehouse_ready_prefix: transit-equity/warehouse_ready
  raw_prefix: transit-equity/raw
  dbt_artifacts_prefix: transit-equity/dbt_artifacts

redshift:
  schema_raw: raw
  schema_staging: staging
  port: 5439

dbt:
  project_dir: dbt_transit_equity
  profiles_dir: dbt_transit_equity
  target: dev
