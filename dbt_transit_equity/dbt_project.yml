name: dbt_transit_equity
version: 1.0.0
config-version: 2

profile: dbt_transit_equity

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
log-path: "logs"
clean-targets:
  - "target"
  - "dbt_packages"
  - "logs"

models:
  dbt_transit_equity:
    +materialized: view
    staging:
      +schema: staging
      gtfs:
        +tags: ["staging", "gtfs"]
      geospatial:
        +tags: ["staging", "geospatial"]
      analytics:
        +tags: ["staging", "analytics"]
      equity:
        +tags: ["staging", "equity"]
    intermediate:
      +schema: intermediate
      transport:
        +tags: ["intermediate", "transport"]
      geospatial:
        +tags: ["intermediate", "geospatial"]
      equity:
        +tags: ["intermediate", "equity"]
      scoring:
        +tags: ["intermediate", "scoring"]
    marts:
      +schema: marts
      transport:
        +tags: ["marts", "transport"]
      equity:
        +tags: ["marts", "equity"]
      reporting:
        +tags: ["marts", "reporting"]
