version: 2

models:
  - name: stg_gtfs_stops
    columns:
      - name: stop_id
        tests: [not_null, unique]
      - name: stop_lat
        tests: [not_null]
      - name: stop_lon
        tests: [not_null]

  - name: stg_gtfs_routes
    columns:
      - name: route_id
        tests: [not_null, unique]

  - name: stg_gtfs_trips
    columns:
      - name: trip_id
        tests: [not_null, unique]
      - name: route_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_gtfs_routes')
                field: route_id

  - name: stg_gtfs_stop_times
    columns:
      - name: trip_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_gtfs_trips')
                field: trip_id
      - name: stop_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_gtfs_stops')
                field: stop_id

  - name: stg_gtfs_trip_updates
    columns:
      - name: entity_id
        tests: [not_null]
      - name: snapshot_timestamp
        tests: [not_null]

  - name: stg_gtfs_service_alerts
    columns:
      - name: entity_id
        tests: [not_null]
      - name: snapshot_timestamp
        tests: [not_null]
